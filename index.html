<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD ESA! 🎂✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card-container">
        
        <div class="glow-circle top-left"></div>
        <div class="glow-circle bottom-right"></div>

        <div class="card-content">
            <div class="image-section">
                <span class="main-emoji" id="emoji-display">🎁</span>
            </div>

            <h1 class="title">Happy Birthday, Esa! 🥳🎉</h1>
            
            <p class="message" id="text-message">
                Selamat berkurang umur ya! Semoga makin sukses, sehat selalu, dan semua impian lo bisa tercapai tahun ini. 
            </p>
            
            <h2 class="question" id="main-question">Mau traktiran atau hadiah nih? 🤔</h2>

            <div class="btn-group">
                <button id="btn-traktir" class="btn btn-primary">Traktiran Dong! 🍕</button>
                <button id="btn-hadiah" class="btn btn-secondary">Kado Aja 🎁</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
